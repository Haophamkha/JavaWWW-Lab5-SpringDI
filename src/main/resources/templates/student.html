<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            max-width: 900px;
            margin: auto;
        }

        input {
            padding: 6px 10px;
            margin-right: 10px;
        }

        button {
            padding: 6px 14px;
            background: #007bff;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        a{
            text-decoration:none;
            margin:0 5px;
            color:red;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Thêm sinh viên</h2>

    <form th:action="@{/students/add}" method="post">

        <input type="text" name="name" placeholder="Tên" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="number" name="age" placeholder="Tuổi" required>

        <button type="submit">Thêm</button>

    </form>


    <h2>Tìm sinh viên</h2>

    <form th:action="@{/students/search}" method="get">
        <input type="text" name="name" placeholder="Nhập tên">
        <button type="submit">Tìm</button>
    </form>

    <h2>Danh sách sinh viên</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Email</th>
            <th>Tuổi</th>
            <th>Action</th>
        </tr>

        <tr th:each="s : ${students}">

            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.email}"></td>
            <td th:text="${s.age}"></td>

            <td>

            <td>

                <form th:action="@{/students/edit}" method="get" style="display:inline;">
                    <input type="hidden" name="id" th:value="${s.id}">
                    <button type="submit">Edit</button>
                </form>

                <form th:action="@{/students/delete}" method="get"
                      style="display:inline;"
                      onsubmit="return confirm('Bạn có chắc muốn xóa?')">

                    <input type="hidden" name="id" th:value="${s.id}">
                    <button type="submit" style="background:red;">Delete</button>

                </form>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
